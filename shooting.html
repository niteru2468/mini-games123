<!DOCTYPE html>
<html>
<head>
  <title>シューティング（爆発付き）</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: linear-gradient(black, darkblue);
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>🔫 SHOOTING GAME</h1>
<p>Score: <span id="score">0</span> | ❤️ <span id="life">3</span></p>

<canvas id="game" width="300" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let life = 3;
let gameOver = false;

// プレイヤー
let player = {
  x: 140,
  y: 350,
  size: 20
};

// 弾
let bullets = [];

// ===== 爆発 =====
let explosions = [];

// 敵
let enemies = [];

function createEnemy() {
  return {
    x: Math.random() * 260,
    y: 0,
    size: 30,
    dx: (Math.random() * 2 + 1) * (Math.random() < 0.5 ? 1 : -1),
    dy: Math.random() * 1 + 0.5,
    color: "hsl(" + Math.random()*360 + ",100%,50%)"
  };
}

// 3体
for (let i = 0; i < 3; i++) {
  enemies.push(createEnemy());
}

// ===== 連射 =====
let isTouching = false;
let shootInterval;

canvas.addEventListener("touchstart", function() {
  if (gameOver) return;

  isTouching = true;

  shootInterval = setInterval(() => {
    bullets.push({
      x: player.x + player.size / 2 - 2,
      y: player.y,
      size: 6,
      dy: -6
    });
  }, 150);
});

canvas.addEventListener("touchmove", function(e) {
  if (!isTouching || gameOver) return;

  let rect = canvas.getBoundingClientRect();
  let touch = e.touches[0];

  player.x = touch.clientX - rect.left - player.size / 2;

  if (player.x < 0) player.x = 0;
  if (player.x + player.size > canvas.width) {
    player.x = canvas.width - player.size;
  }
});

canvas.addEventListener("touchend", function() {
  isTouching = false;
  clearInterval(shootInterval);
});

// ===== ゲームループ =====
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // プレイヤー
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y + player.size);
  ctx.lineTo(player.x + player.size / 2, player.y);
  ctx.lineTo(player.x + player.size, player.y + player.size);
  ctx.fill();

  // 敵
  for (let j = 0; j < enemies.length; j++) {
    let e = enemies[j];

    e.x += e.dx;
    e.y += e.dy;

    if (e.x <= 0 || e.x + e.size >= canvas.width) {
      e.dx *= -1;
    }

    if (e.y + e.size >= canvas.height) {
      life--;
      document.getElementById("life").innerText = life;
      enemies[j] = createEnemy();

      if (life <= 0) gameOver = true;
    }

    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y, e.size, e.size);
  }

  // 弾
  for (let i = 0; i < bullets.length; i++) {
    let b = bullets[i];
    b.y += b.dy;

    ctx.fillStyle = "yellow";
    ctx.shadowColor = "yellow";
    ctx.shadowBlur = 10;
    ctx.fillRect(b.x, b.y, b.size, b.size);
    ctx.shadowBlur = 0;

    for (let j = 0; j < enemies.length; j++) {
      let e = enemies[j];

      if (
        b.x < e.x + e.size &&
        b.x + b.size > e.x &&
        b.y < e.y + e.size &&
        b.y + b.size > e.y
      ) {
        score++;
        document.getElementById("score").innerText = score;

        // ===== 爆発追加 =====
        explosions.push({
          x: e.x + e.size / 2,
          y: e.y + e.size / 2,
          radius: 0
        });

        enemies[j] = createEnemy();

        bullets.splice(i, 1);
        i--;
        break;
      }
    }

    if (b.y < 0) {
      bullets.splice(i, 1);
      i--;
    }
  }

  // ===== 爆発描画 =====
  for (let i = 0; i < explosions.length; i++) {
    let ex = explosions[i];

    ex.radius += 2;

    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI * 2);
    ctx.strokeStyle = "orange";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 一定サイズで消える
    if (ex.radius > 20) {
      explosions.splice(i, 1);
      i--;
    }
  }

  // ゲームオーバー
  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 60, 200);
    return;
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
